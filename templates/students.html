<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生管理</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>学生列表</h2>
    <a class="btn btn-primary mb-3" href="{{ url_for('attendance.add_student') }}">添加学生</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>学号</th>
            <th>姓名</th>
            <th>班级</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        {% for s in students %}
            <tr>
                <td>{{ s.student_no }}</td>
                <td>{{ s.name }}</td>
                <td>{{ s.clazz }}</td>
                <td>
                    <a class="btn btn-sm btn-secondary"
                       href="{{ url_for('attendance.capture_face', student_id=s.id) }}">录入人脸</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>

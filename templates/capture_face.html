<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>录入人脸 - {{ student.name }}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>为 {{ student.name }} 录入人脸</h2>
    <video id="video" width="480" height="360" autoplay class="mb-3 border"></video>
    <div>
        <button id="capture" class="btn btn-primary">抓拍并保存</button>
    </div>
    <p id="status" class="mt-3 text-muted"></p>
</div>
<script>
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('capture');
    const statusText = document.getElementById('status');

    navigator.mediaDevices.getUserMedia({video: true})
        .then(stream => {
            video.srcObject = stream;
        });

    captureBtn.onclick = async () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
        const formData = new FormData();
        formData.append('frame', blob, 'frame.jpg');
        const resp = await fetch('{{ url_for("attendance.capture_face_frame", student_id=student.id) }}', {
            method: 'POST',
            body: formData
        });
        const data = await resp.json();
        if (data.success) {
            statusText.textContent = '人脸录入成功';
        } else {
            statusText.textContent = '录入失败：' + (data.message || '');
        }
    };
</script>
</body>
</html>

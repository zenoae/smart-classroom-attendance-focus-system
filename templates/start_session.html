<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发起课堂考勤</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>发起课堂考勤</h2>
    <form method="post">
        <div class="mb-3">
            <label class="form-label">选择课程</label>
            <select class="form-select" name="course_id" required>
                <option value="">请选择课程</option>
                {% for c in courses %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">教室</label>
            <input type="text" class="form-control" name="classroom">
        </div>
        <button type="submit" class="btn btn-primary">开始考勤</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>课堂场次列表</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>课堂场次列表</h2>

    <a class="btn btn-primary mb-3" href="{{ url_for('attendance.start_session') }}">发起新的课堂考勤</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>课程</th>
            <th>教室</th>
            <th>开始时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        {% for s in sessions %}
            <tr>
                <td>{{ s.id }}</td>
                <td>{{ s.course.name }}</td>
                <td>{{ s.classroom }}</td>
                <td>{{ s.start_time }}</td>
                <td>
                    <a class="btn btn-sm btn-secondary"
                       href="{{ url_for('attendance.run_session', session_id=s.id) }}">进入课堂考勤</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
